name: CI

on:
  push:
    branches: [main]
    # Skip CI on doc-only / VERSION-only / LICENSE-only commits —
    # they can't break a Rust build and we're conserving free-tier
    # Actions minutes (May 18 2026 cap incident).
    paths-ignore:
      - '**.md'
      - 'VERSION'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - '.gitignore'
  workflow_dispatch:
  # Weekly supply-chain refresh. cargo-deny + SBOM only runs on this
  # trigger and on pull_request (not on push-to-main) — see the
  # supply-chain job's `if:` gate below.
  schedule:
    - cron: '17 3 * * 0'

jobs:
  ci:
    name: cargo check / test / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Manifest assembler vendored byte-for-byte from clavenar-e2e commit
      # 8648e8c5b259922c35fc48acad9d4618f9b17d92. It derives Cargo path deps
      # and literal Rust include_str!/include_bytes! sibling inputs.
      - name: assemble compile-time sibling inputs
        env:
          GH_TOKEN: ${{ secrets.CLAVENAR_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CLAVENAR_REPO_TOKEN secret not set for manifest-derived sibling checkout."
            exit 1
          fi
          echo "7fd09408f7a87cde37e6b9aaa410a4cb92efcc0ac01f51aaab710d3d0feecd6b  .github/scripts/assemble_repositories.py" | sha256sum -c -
          python3 .github/scripts/assemble_repositories.py checkout \
            --root "$GITHUB_WORKSPACE" --ref main > assembly-receipt.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: upload repository assembly receipt
        uses: actions/upload-artifact@v5
        with:
          name: repository-assembly-${{ github.job }}-${{ github.sha }}
          path: assembly-receipt.json
          if-no-files-found: error
          retention-days: 90

  # Supply-chain gate. cargo-deny runs four checks against `deny.toml` at
  # the repo root: advisories (RUSTSEC vulns + unmaintained), licenses
  # (allow-list), bans (multiple-version warnings), sources (only
  # crates.io). The deny.toml file is synced verbatim across all 14 Rust
  # repos — edit clavenar-specs first if policy changes, then mirror into
  # every other repo. cargo-deny runs `cargo metadata`, so both jobs use the
  # same manifest-derived assembly step for every required sibling input.
  supply-chain:
    name: cargo-deny + cyclonedx SBOM
    # Skip on push-to-main — the diff was already audited on its PR
    # (cargo-deny is deterministic per Cargo.lock). Weekly schedule
    # catches new RUSTSEC advisories regardless of activity.
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: assemble compile-time sibling inputs
        env:
          GH_TOKEN: ${{ secrets.CLAVENAR_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CLAVENAR_REPO_TOKEN secret not set for manifest-derived sibling checkout."
            exit 1
          fi
          echo "7fd09408f7a87cde37e6b9aaa410a4cb92efcc0ac01f51aaab710d3d0feecd6b  .github/scripts/assemble_repositories.py" | sha256sum -c -
          python3 .github/scripts/assemble_repositories.py checkout \
            --root "$GITHUB_WORKSPACE" --ref main > assembly-receipt.json

      # cargo-deny + cargo-cyclonedx are run host-side via cargo-binstall
      # rather than the dockerized EmbarkStudios action because that
      # action mounts only `/github/workspace`, which makes the
      # `../clavenar-sdk` path-dep invisible to `cargo metadata` inside
      # the container. cargo-binstall pulls each prebuilt binary in
      # ~3s instead of building from source (~2 min). SBOM lands as
      # `<crate>.cdx.json` at the repo root; we upload it as a build
      # artifact so reviewers can diff dep graphs across PRs and so a
      # future release pipeline can attach it to GitHub releases.
      - uses: dtolnay/rust-toolchain@stable

      - uses: cargo-bins/cargo-binstall@main

      - name: install cargo-deny + cargo-cyclonedx
        run: cargo binstall --no-confirm cargo-deny cargo-cyclonedx

      - name: cargo-deny check all
        run: cargo deny check all

      - name: generate SBOM
        run: cargo cyclonedx --format json --describe crate

      - name: upload SBOM
        uses: actions/upload-artifact@v5
        with:
          name: sbom-${{ github.event.repository.name }}-${{ github.sha }}
          path: '*.cdx.json'
          if-no-files-found: error
          retention-days: 90

      - name: upload repository assembly receipt
        uses: actions/upload-artifact@v5
        with:
          name: repository-assembly-${{ github.job }}-${{ github.sha }}
          path: assembly-receipt.json
          if-no-files-found: error
          retention-days: 90
