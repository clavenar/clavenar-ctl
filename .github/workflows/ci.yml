name: CI

on:
  push:
    branches: [main]
    # Skip CI on doc-only / VERSION-only / LICENSE-only commits —
    # they can't break a Rust build and we're conserving free-tier
    # Actions minutes (May 18 2026 cap incident).
    paths-ignore:
      - '**.md'
      - 'VERSION'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - '.gitignore'
  # Weekly supply-chain refresh. cargo-deny + SBOM only runs on this
  # trigger and on pull_request (not on push-to-main) — see the
  # supply-chain job's `if:` gate below.
  schedule:
    - cron: '17 3 * * 0'

jobs:
  ci:
    name: cargo check / test / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Sibling-checkout: clavenar-ctl declares clavenar-rust-sdk as a path dep
      # ("../clavenar-rust-sdk") and additionally `include_str!`s policy
      # templates from `../clavenar-policy-engine/policies/templates/`
      # (see src/cmd/policy.rs). All repos sit as siblings under
      # repos/ in local dev. CI gets only one repo by default, so we
      # clone the siblings into the same relative location. Requires a
      # CLAVENAR_REPO_TOKEN secret: a fine-grained PAT with Contents:Read
      # on clavenar/clavenar-rust-sdk + clavenar-policy-engine.
      # actions/checkout's `path` is restricted to inside the
      # workspace, so we use `gh repo clone` directly to land outside.
      - name: checkout siblings
        env:
          GH_TOKEN: ${{ secrets.CLAVENAR_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CLAVENAR_REPO_TOKEN secret not set. Create a fine-grained PAT with Contents:Read on clavenar/clavenar-rust-sdk + clavenar-policy-engine and add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          gh repo clone clavenar/clavenar-rust-sdk ../clavenar-rust-sdk -- --depth 1
          gh repo clone clavenar/clavenar-policy-engine ../clavenar-policy-engine -- --depth 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # Supply-chain gate. cargo-deny runs four checks against `deny.toml` at
  # the repo root: advisories (RUSTSEC vulns + unmaintained), licenses
  # (allow-list), bans (multiple-version warnings), sources (only
  # crates.io). The deny.toml file is synced verbatim across all 14 Rust
  # repos — edit clavenar-specs first if policy changes, then mirror into
  # every other repo. Sibling-checkout: cargo-deny runs `cargo metadata`
  # which has to resolve the clavenar-rust-sdk path dep, so we mirror the
  # sibling-checkout step from the `ci` job.
  supply-chain:
    name: cargo-deny + cyclonedx SBOM
    # Skip on push-to-main — the diff was already audited on its PR
    # (cargo-deny is deterministic per Cargo.lock). Weekly schedule
    # catches new RUSTSEC advisories regardless of activity.
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: checkout siblings
        env:
          GH_TOKEN: ${{ secrets.CLAVENAR_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CLAVENAR_REPO_TOKEN secret not set."
            exit 1
          fi
          gh repo clone clavenar/clavenar-rust-sdk ../clavenar-rust-sdk -- --depth 1
          gh repo clone clavenar/clavenar-policy-engine ../clavenar-policy-engine -- --depth 1

      # cargo-deny + cargo-cyclonedx are run host-side via cargo-binstall
      # rather than the dockerized EmbarkStudios action because that
      # action mounts only `/github/workspace`, which makes the
      # `../clavenar-rust-sdk` path-dep invisible to `cargo metadata` inside
      # the container. cargo-binstall pulls each prebuilt binary in
      # ~3s instead of building from source (~2 min). SBOM lands as
      # `<crate>.cdx.json` at the repo root; we upload it as a build
      # artifact so reviewers can diff dep graphs across PRs and so a
      # future release pipeline can attach it to GitHub releases.
      - uses: dtolnay/rust-toolchain@stable

      - uses: cargo-bins/cargo-binstall@main

      - name: install cargo-deny + cargo-cyclonedx
        run: cargo binstall --no-confirm cargo-deny cargo-cyclonedx

      - name: cargo-deny check all
        run: cargo deny check all

      - name: generate SBOM
        run: cargo cyclonedx --format json --describe crate

      - name: upload SBOM
        uses: actions/upload-artifact@v5
        with:
          name: sbom-${{ github.event.repository.name }}-${{ github.sha }}
          path: '*.cdx.json'
          if-no-files-found: error
          retention-days: 90
