name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: cargo check / test / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sibling-checkout: warden-ctl declares warden-sdk as a path dep
      # ("../warden-sdk") because all repos sit as siblings under
      # repos/ in local dev. CI gets only one repo by default, so we
      # clone the sibling into the same relative location. Requires a
      # WARDEN_REPO_TOKEN secret: a fine-grained PAT with Contents:Read
      # on vanteguardlabs/warden-sdk. actions/checkout's `path` is
      # restricted to inside the workspace, so we use `gh repo clone`
      # directly to land outside it.
      - name: checkout warden-sdk sibling
        env:
          GH_TOKEN: ${{ secrets.WARDEN_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::WARDEN_REPO_TOKEN secret not set. Create a fine-grained PAT with Contents:Read on vanteguardlabs/warden-sdk and add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          gh repo clone vanteguardlabs/warden-sdk ../warden-sdk -- --depth 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # Supply-chain gate. cargo-deny runs four checks against `deny.toml` at
  # the repo root: advisories (RUSTSEC vulns + unmaintained), licenses
  # (allow-list), bans (multiple-version warnings), sources (only
  # crates.io). The deny.toml file is synced verbatim across all 14 Rust
  # repos — edit warden-specs first if policy changes, then mirror into
  # every other repo. Sibling-checkout: cargo-deny runs `cargo metadata`
  # which has to resolve the warden-sdk path dep, so we mirror the
  # sibling-checkout step from the `ci` job.
  supply-chain:
    name: cargo-deny + cyclonedx SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: checkout warden-sdk sibling
        env:
          GH_TOKEN: ${{ secrets.WARDEN_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::WARDEN_REPO_TOKEN secret not set."
            exit 1
          fi
          gh repo clone vanteguardlabs/warden-sdk ../warden-sdk -- --depth 1

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

      # cargo-cyclonedx publishes prebuilt binaries on every release, so
      # cargo-binstall pulls one in ~3s rather than cargo-installing from
      # source (~2 min). SBOM lands as `<crate>.cdx.json` at the repo
      # root; we upload it as a build artifact so reviewers can diff dep
      # graphs across PRs and so a future release pipeline can attach it
      # to GitHub releases.
      - uses: cargo-bins/cargo-binstall@main

      - name: install cargo-cyclonedx
        run: cargo binstall --no-confirm cargo-cyclonedx

      - name: generate SBOM
        run: cargo cyclonedx --format json --describe crate

      - name: upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.event.repository.name }}-${{ github.sha }}
          path: '*.cdx.json'
          if-no-files-found: error
          retention-days: 90
